name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      manifest_generated_at:
        description: Manifest generatedAt published by the media worker
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://niazphotography.com
      SITE_URL: https://niazphotography.com
      NEXT_PUBLIC_MEDIA_BASE_URL: ${{ vars.NEXT_PUBLIC_MEDIA_BASE_URL }}
      NEXT_PUBLIC_IMAGE_BASE_URL: ${{ vars.NEXT_PUBLIC_IMAGE_BASE_URL || vars.PUBLIC_IMAGE_BASE_URL || 'https://images.niazphotography.com' }}
      NEXT_PUBLIC_VIDEO_BASE_URL: ${{ vars.NEXT_PUBLIC_VIDEO_BASE_URL }}
      NEXT_PUBLIC_MEDIA_MANIFEST_URL: ${{ vars.NEXT_PUBLIC_MEDIA_MANIFEST_URL || vars.MEDIA_MANIFEST_URL || 'https://images.niazphotography.com/media-manifest.json' }}
      MEDIA_MANIFEST_URL: ${{ vars.MEDIA_MANIFEST_URL || vars.NEXT_PUBLIC_MEDIA_MANIFEST_URL || 'https://images.niazphotography.com/media-manifest.json' }}
      MEDIA_MANIFEST_EXPECTED_GENERATED_AT: ${{ github.event.inputs.manifest_generated_at }}
      MEDIA_MANIFEST_EXPECTED_WAIT_TIMEOUT_MS: '90000'
      MEDIA_MANIFEST_EXPECTED_WAIT_POLL_MS: '1000'
      SYNC_MEDIA_ALLOW_FALLBACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manifest_generated_at && '0' || '1' }}
      PUBLIC_IMAGE_BASE_URL: ${{ vars.PUBLIC_IMAGE_BASE_URL || vars.NEXT_PUBLIC_IMAGE_BASE_URL || 'https://images.niazphotography.com' }}
      MEDIA_MANIFEST_OBJECT_KEY: ${{ vars.MEDIA_MANIFEST_OBJECT_KEY || 'media-manifest.json' }}
      CAPTIONS_OBJECT_KEY: ${{ vars.CAPTIONS_OBJECT_KEY || 'captions.json' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Heal missing thumbnails
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: npm run thumbs:heal
        env:
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_PHOTO_PREFIX: ${{ vars.R2_PHOTO_PREFIX }}
          R2_PHOTO_THUMB_PREFIX: ${{ vars.R2_PHOTO_THUMB_PREFIX }}
          R2_VIDEO_PREFIX: ${{ vars.R2_VIDEO_PREFIX }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Sync media manifest
        run: npm run sync:media

      - name: Extract EXIF metadata (fallback)
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: npm run photo:exif

      - name: Build
        run: npx next build

      - name: Preserve Next.js assets for Pages
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
